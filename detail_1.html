<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background-color: #ffffff; color: #333; font-family: sans-serif; }
        .container { width: 1500px; margin: 150px auto; padding-top: 80px; text-align: center; }

        /* 테이블 레이아웃을 유연하게 변경 */
        .snack-table { width: 100%; border-spacing: 20px 50px; table-layout: auto; }
        .snack-table td { vertical-align: top; width: 33.33%; }

        /* 이미지 박스: % 단위로 설정하여 부모 칸에 맞춤 */
        .img-box { 
            width: 90%; 
            margin: 0 auto 20px; 
            aspect-ratio: 1/1; 
            background: #f4f4f4; 
            border-radius: 15px; 
            overflow: hidden; 
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* 텍스트 스타일 */
        .p-name { font-size: 55px; font-weight: bold; margin-bottom: 15px; }
        .p-detail { font-size: 40px; color: #003366; font-weight: bold; }

        /* 칸 전체를 감싸는 링크: flex로 높이 자동 조절 */
        .product-link {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: inherit;
            border: 2px solid #9c9c9c; 
            border-radius: 20px; 
            padding: 40px;
            min-height: 600px; /* 여기서 전체 박스 높이를 조절하세요 */
            background-color: #fff;
            transition: 0.3s;
        }

        .product-link:hover { transform: scale(1.02); border-color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="font-size: 55px;">Snack Craft Line-up</h1>
    
    <table class="snack-table">
        <tr>
            <td>
                <a href="detail_1.html" target="mainFrame" class="product-link">
                    <div class="img-box"><img src="https://i.postimg.cc/kGVX8yqj/packcas.png"></div>
                    <div class="p-name">박카스</div>
                    <div class="p-detail">상세보기 ></div>
                </a>
            </td>
            <td>
                <a href="detail_1.html" target="mainFrame" class="product-link">
                    <div class="img-box"><img src="https://i.postimg.cc/02wyyZtB/eclipse.png"></div>
                    <div class="p-name">이클립스</div>
                    <div class="p-detail">상세보기 ></div>
                </a>
            </td>
            <td>
                <a href="detail_1.html" target="mainFrame" class="product-link">
                    <div class="img-box"><img src="이미지주소"></div>
                    <div class="p-name">수제 캔디</div>
                    <div class="p-detail">상세보기 ></div>
                </a>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
