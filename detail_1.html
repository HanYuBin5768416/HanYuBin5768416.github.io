<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KODEX 상품 상세정보</title>
    <style>
        /* 네이버 스토어 표준 규격 스타일 */
        body { font-family: 'Apple SD Gothic Neo','Malgun Gothic', sans-serif; margin: 0; background-color: #fff; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* 상품 요약 정보 (규격화된 구역) */
        .summary-section { display: flex; gap: 40px; margin: 40px 0; border-bottom: 1px solid #eee; padding-bottom: 40px; }
        .product-main-img { width: 450px; height: 450px; background: #f9f9f9; border: 1px solid #c9c9c9; }
        .info-box { flex: 1; }
        .info-box h1 { font-size: 28px; margin-top: 0; }
        .yield-badge { background: #ff3344; color: #fff; padding: 5px 10px; border-radius: 5px; font-weight: bold; }

        /* 하단 상세 설명 (포토샵 이미지 들어갈 자리) */
        .detail-desc { margin-top: 50px; text-align: center; }
        .detail-desc img { width: 100%; max-width: 800px; }

        /* 하단 고정 상담 버튼 */
        .fixed-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #eee; padding: 15px 0; text-align: center; }
        .btn-apply { width: 400px; height: 55px; background: #0055ff; color: #fff; border: none; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="summary-section">
        <img src="https://i.postimg.cc/cCH4k7FV/nasdaq100.jpg" class="product-main-img" alt="상품그래프">
        
        <div class="info-box">
            <span class="yield-badge">BEST 상품</span>
            <h1>KODEX 미국나스닥100</h1>
            <p style="font-size: 24px; color: #ff3344; font-weight: bold;">최근 1년 수익률: 41.2%</p>
            <hr>
            <p style="color: #666; line-height: 1.6;">본 상품은 미국 나스닥 시장의 핵심 100개 종목에 투자하는 삼성자산운용의 대표 ETF입니다. 나무증권, 토스증권 등에서 즉시 매수 가능합니다.</p>
        </div>
    </div>

    <div class="detail-desc">
        <h3>[ 상품 상세 분석 리포트 ]</h3>
        <img src="detail.png" alt="상세 설명 이미지">
    </div>
</div>

<div class="fixed-footer">
    <button class="btn-apply" onclick="alert('가입 상담 예약이 완료되었습니다!')">가입 상담 신청하기</button>
</div>                              
                                <!-- 팝업창 띄우기  -->

</body>
</html>
