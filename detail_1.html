<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background-color: #ffffff; color: #333; font-family: sans-serif; }
        .container { width: 1000px; margin: 150px auto; text-align: center; }
        
        /* 테이블 설정: 한 줄에 3개 고정 */
        .snack-table { width: 100%; border-spacing: 20px 50px; table-layout: fixed; }
        .snack-table td { vertical-align: top; }

        /* 이미지 박스: 1:1 비율 */
        .img-box { width: 100%; aspect-ratio: 1/1; background: #f4f4f4; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* 제품명 버튼 */
        .p-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; }

    /* 칸 전체를 감싸는 링크 */
    .product-link {
    display: block;
    text-decoration: none;
    color: inherit;
    
    /*테두리와 곡선 */
    border: 1px solid #9c9c9c; 
    border-radius: 15px;    /*둥글게 조절 */
    overflow: hidden;       /* 내부 이미지가 튀어나오지 않게 깎아줌 */
    padding: 15px;          /* 안쪽 여백 */
    background-color: #fff;
    transition: 0.3s;
}

    /* 마우스 올렸을 때 */
    .product-link:hover .img-box {
        transform: scale(1.02); /* 살짝 커지는 효과 */
        transition: 0.2s;
    }
    </style>
</head>
<body>

<div class="container">
    <h1 style="font-size: 24px;">Snack Craft Line-up</h1>
    
    <table class="snack-table">
        <tr>
            <td>
                <a href="detail_1.html" target="mainFrame" class="product-link">
                    <div class="img-box">
                        <img src="https://i.postimg.cc/3wVJGLGW/snack.png">
                    </div>
                    <div class="p-name">랑그리 초코샌드</div>
                    <div style="font-size: 12px; color: #003366;">상세보기 ></div>
                </a>
            </td>
            <td>
                <div class="img-box"><img src="이미지주소"></div>
                <div class="p-name">바삭 초코</div>
                <a href="detail_2.html" target="mainFrame" class="btn-go">상세보기</a>
            </td>
            <td>
                <div class="img-box"><img src="이미지주소"></div>
                <div class="p-name">수제 캔디</div>
                <a href="detail_3.html" target="mainFrame" class="btn-go">상세보기</a>
            </td>
        </tr>
        </table>
</div>

</body>
</html>
