<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background-color: #fcfcfc; color: #333; font-family: 'Pretendard', sans-serif; }
        .container { width: 1500px; margin: 0 auto; padding: 150px 0; text-align: center; }

        /* 메인 타이틀 */
        .title { font-size: 64px; font-weight: 800; margin-bottom: 80px; letter-spacing: -1px; }

        /* 카드 배치: Flexbox 사용 */
        .snack-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        /* 제품 카드 스타일 */
        .product-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 450px;
            padding: 50px;
            background: #ffffff;
            border: 1px solid #eee;
            border-radius: 30px;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .product-link:hover {
            transform: translateY(-20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border-color: #000;
        }

        /* 이미지 박스 */
        .img-box { 
            width: 100%; 
            aspect-ratio: 1/1; 
            background: #f7f7f7; 
            border-radius: 20px; 
            margin-bottom: 40px; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }

        /* 텍스트 스타일 */
        .p-name { font-size: 48px; font-weight: 700; margin-bottom: 20px; }
        .p-detail { font-size: 24px; color: #0066ff; font-weight: 600; margin-top: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="title">Snack Craft Line-up</h1>
    
    <div class="snack-grid">
        <a href="detail_1.html" target="mainFrame" class="product-link">
            <div class="img-box"><img src="https://i.postimg.cc/kGVX8yqj/packcas.png"></div>
            <div class="p-name">박카스</div>
            <div class="p-detail">상세보기 ></div>
        </a>

        <a href="detail_1.html" target="mainFrame" class="product-link">
            <div class="img-box"><img src="https://i.postimg.cc/02wyyZtB/eclipse.png"></div>
            <div class="p-name">이클립스</div>
            <div class="p-detail">상세보기 ></div>
        </a>

        <a href="detail_1.html" target="mainFrame" class="product-link">
            <div class="img-box"><img src="이미지주소" onerror="this.style.display='none'"></div>
            <div class="p-name">수제 캔디</div>
            <div class="p-detail">상세보기 ></div>
        </a>
    </div>
</div>

</body>
</html>
