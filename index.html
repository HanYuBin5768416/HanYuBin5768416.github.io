<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Snack Craft</title>
    <style>
        /* 1. 기본 설정: 여백 제거 및 폰트 통합 */
        * { 
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            margin: 0; padding: 0; 
            box-sizing: border-box;
        }

        /* 2. 상단바: 배경은 100%, z-index로 최상단 고정 */
        .main-header {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 110px;
            background-color: #002D72;
            z-index: 5;
        }

        .main-header table {
            margin: 0 auto; /* 테이블을 무조건 가로 중앙에 배치 */
        }
    
        .Logo {
            vertical-align: middle;
            font-size: 30px;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }
        .logo-suppt {
            width: 30px;
            height: 10px;
            z-index: 10;
        }
        /* 3. 메뉴 링크 스타일 */
        .menu-link, .sub-link { text-decoration: none; display: inline-block; }
        .menu-link { color: white !important; font-size: 22px; font-weight: 700; margin: 0 25px; }
        .sub-link { color: rgba(255, 255, 255, 0.7) !important; font-size: 14px; margin-left: 20px; }

        /* 4. 비스듬한 배경: 이미지 태그가 화면 꽉 차게 설정 */
        .hero-section {
            position: fixed;
            top: 110px; /* 헤더 바로 아래 붙임 */
            width: 100%;
            z-index: 5;
            line-height: 0; /* 이미지 하단 미세 여백 제거 */
            background-color: transparent !important;
        }
        .hero-section img {
            width: 100%; height: auto;
        }

        /* 5. 본문 영역: iframe 중앙 정렬 */
        .main-content-area {
            margin-top: 50px;
            text-align: center;
            width: 100%;
        }

        #mainFrame {
            width: 100%;
            height: 2500px;
            border: none;
            display: block;
            margin: 0 auto; /*창 늘려도 중앙 유지  */
        }
    </style>
</head>
<body>

<header class="main-header">
    <table width="1280" border="0" align="center" cellpadding="0" cellspacing="0" style="height: 110px; table-layout: fixed;">
        <tr>
            <td width="400" align="left" style="padding-left: 20px;">
                <a href="" class="Logo">Snack Craft</a>
            </td>

            <td width="480" align="center">
                <a href="" class="menu-link">회사 개요</a>
                <a href="test3.html" class="menu-link" target="mainFrame">제품 라인업</a>
                <a href="" class="menu-link">고객지원</a>
            </td>

            <td width="400" align="right" style="padding-right: 20px;">
                <a href="#" class="sub-link">네이버 블로그</a>
                <a href="#" class="sub-link">네이버 카페</a>
                <a href="#" class="sub-link">티스토리</a>
                <a href="#" class="sub-link">다음카페</a>
            </td>
        </tr>
    </table>
</header>

<div class="hero-section">
    <img src="https://i.postimg.cc/5Npxm2v7/back-(2).png" alt="배경">
</div>
<div class="logo-suppt">
    <img src="">
</div>

<div class="main-content-area">
    <iframe src="test2.html" id="mainFrame" name="mainFrame" scrolling="no"></iframe>
</div>

</body>
</html>
