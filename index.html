<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FINANCIAL STORE</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #fff; }

        /* 상단바 */
        .header-wrapper { 
            position: fixed; top: 0; left: 0; width: 100%; height: 160px; /* 상단바 고정 절대적 위치 fixed*/
            background: #fff; border-bottom: 1px solid #eeeeee; z-index: 1000; /* 레이어 순위 설정 z index*/
        }

        /* 실제 컨텐츠가 들어가는 구역 */
        .header-content { 
            max-width: 1280px;
            margin: 0 auto; 
            padding: 25px 20px 0 20px; 
        }

        .top-row { 
            display: flex; 
            justify-content: space-between; /* 로고는 왼쪽, 검색창은 오른쪽 끝으로 */
            align-items: center; /*로고랑 검색창의 상하 정렬*/
            margin-bottom: 25px;
        }

        .logo { 
            font-size: 28px; 
            font-weight: 800; 
            color: #0055ff; 
            text-decoration: none; 
            letter-spacing: -0.5px; /*로고 글씨 간격 줄이기*/
        }

        /* 검색창 */
        .search-bar { 
            border: 2px solid #0055ff; 
            padding: 8px 20px; 
            border-radius: 25px; 
            width: 350px; 
            display: flex; /*정렬모드*/
            justify-content: space-between; /*좌  우*/
            align-items: center; /*상   하*/
            font-size: 15px; 
            color: #333; 
        }

        /* 카테고리 메뉴*/
        nav { 
            display: flex; 
            gap: 25px; 
            padding: 20px 0; 
            font-size: 15px; 
            font-weight: 500; 
            color: #333;
            border-top: 1px solid #f2f2f2;
        }
        nav span { cursor: pointer; } /*카테고리 부분에 마우스 올렸을때 반응*/
        nav span:hover { color: #0055ff; }/*카테고리 부분에 마우스 올렸을때 반응*/

        /* 아래 내용 iframe */
        #content-frame { 
            width: 100%; 
            height: calc(100vh - 162px); 
            margin-top: 162px; 
            border: none; 
        }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <div class="header-content">
            <div class="top-row">
                <a href="" target="content-frame" class="logo">FINANCIAL STORE</a>
                <div class="search-bar">
                    <span style="color:#999">추천 상품 검색</span>
                    <span>🔍</span>
                </div>
            </div>
            <nav>
                <span onclick="document.getElementById('content-frame').src='list.html'">BEST 컬렉션</span> | 
                <span>신규 상장</span> | 
                <span>ISA계좌 전용</span> | 
                <span>연금저축 전용</span> | 
                <span>채권/금리</span> |
                <span>고객 지원</span> | 
            </nav>
        </div>
    </div>

    <iframe src="list.html" id="content-frame" name="content-frame"></iframe>

</body>
</html>
