<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Snack Craft - About</title>
    <style>
        /* 기본 설정 */
        * { margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', sans-serif; color: #333; line-height: 1.6; }

        /* 배너 세팅*/
        .banner-container{
            margin-top: 60px;
        }
        .banner-container img { 
            width: 100%;
            height: 300px;
        }
        /* 1. 상단 소개 */
        .about-hero {
            width: 100%;
            padding: 80px 0;
            background-color: #f8f8f8;
            text-align: center;
        }
        .about-hero h1 {
            font-size: 50px;
            color: #002D72;
            margin-bottom: 20px;
        }

        .back_grand {
            text-align: center;
        }
        /* 2. 연혁 섹션 */
        .history-section {
            width: 1000px; /* 전체 너비 고정 */
            margin: 50px auto;
            padding: 20px;
        }
        .history-title {
            font-size: 40px;
            color: #d3122a;
            font-weight: bold;
            margin-bottom: 50px;
            text-align: center;
        }

        /* 연혁 테이블 스타일 */
        .history-table {
            width: 100%;
            border-collapse: collapse; /* 테두리 겹침 방지 */
        }
        
        /* 중앙 세로선 역할을 할 테두리 설정 */
        .left-box {
            width: 48%;
            text-align: right;
            padding: 30px;
            border-right: 2px solid #ddd; /* 이게 중앙선 역할 */
        }
        .right-box {
            width: 48%;
            text-align: left;
            padding: 30px;
            border-left: 2px solid #ddd; /* 이게 중앙선 역할 */
        }

        .year-text { font-size: 28px; font-weight: bold; color: #002D72; }
        .desc-text { font-size: 18px; color: #555; margin-top: 10px; }
        .history-img {
            width: 350px;
            margin-top: 15px;
            border: 5px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <img src="https://i.postimg.cc/c1gfK6Km/history-banner.png">
    </div>

    <div class="about-hero">
        <h1>About Snack Craft</h1>
        <p>정밀한 공학 설계로 완성된 프리미엄 스낵의 기준.<br>
           기술과 맛의 완벽한 조화를 추구합니다.</p>
    </div>

    <div class="back_grand">
        <img src="https://i.postimg.cc/4y4fbdvm/back-grand.png">
    </div>

    <div class="history-section">
        <div class="history-title">Brand History</div>

        <table class="history-table">
            <tr>
                <td class="left-box">
                    <div class="year-text">2024</div>
                    <div class="desc-text">스낵 크래프트 브랜드 설립<br>기술 연구소 대구 개소</div>
                    <img src="" class="history-img" alt="설립">
                </td>
                <td class="right-box"></td> </tr>

            <tr>
                <td class="left-box"></td> <td class="right-box">
                    <div class="year-text">2025</div>
                    <div class="desc-text">기술 활용<br>프리미엄 1호 제품 출시</div>
                    <img src="" class="history-img" alt="출시">
                </td>
            </tr>

            <tr>
                <td class="left-box">
                    <div class="year-text">2026</div>
                    <div class="desc-text">대구 본사 확장 이전<br>글로벌 마케팅 플랫폼 구축</div>
                    <img src="" class="history-img" alt="확장">
                </td>
                <td class="right-box"></td>
            </tr>
        </table>
    </div>

</body>
</html>
